# tradekit policy dials (DESIGN §7.2; SPRINT P2 batch C, CTO addendum
# "Ambient wiring"). Committed defaults Mike confirms at sprint sign-off —
# `tradekit.policy._dials.PolicyDials` loads THIS file by default; set
# TK_CONFIG_PATH to point at a different one (tests always do). Every value
# here participates in the policy-version hash (`_dials.canonical_dump` +
# `_dials.policy_version_hash`), so changing a dial changes the hash.
#
# THIS FILE IS DATA, NOT CODE: rule GATES live in
# `src/tradekit/policy/_rules.py`; this file only supplies the numeric/list
# knobs each rule's `check` reads off `ctx.dials`. Flat keys (top-level, no
# tables) — `pydantic_settings.TomlConfigSettingsSource` maps them straight
# onto `PolicyDials` field names.

# R-004: live-account asset allowlist (liquid large-caps + BTC/ETH, SME §5).
allowed_assets_live = ["BTC/USD", "ETH/USD", "AAPL", "MSFT", "SPY"]

# R-005: max single-position notional. Live is a FRACTION of AccountConfig
# .principal_usd (TD-24, Mike-signed 2026-07-17; was a flat "25" — 0.05 *
# $500 default principal = $25, numerically unchanged for the default account).
max_position_pct_live = "0.05"
max_position_pct_paper = "0.10"

# R-006: max total live exposure (D12) — FRACTION of principal (TD-24; was
# a flat "100"; 0.20 * $500 = $100, unchanged for the default account).
max_total_live_exposure_pct = "0.20"

# R-007: daily trade count caps.
max_daily_trades_live = 3
max_daily_trades_paper = 20

# R-008: min notional — blocks micro-trade series gaming.
min_notional_usd = "10"

# R-009: drawdown circuit breaker (30d peak).
drawdown_breaker_pct = "0.10"

# R-011: live sequence budget per promotion.
live_sequence_budget = 3

# R-012: sizing-purity tolerance.
sizing_tolerance_pct = "0.01"

# R-013: correlation cap.
correlation_cap = "0.75"

# R-014: advisory cooling-off (manual trades over this FRACTION of principal
# need thesis age >= this). TD-24: was a flat "200"; 0.40 * $500 = $200,
# unchanged for the default account.
cooling_off_pct = "0.40"
cooling_off_hours = 24

# R-015: VOID-rate audit window + cap.
void_rate_window = 20
void_rate_cap_pct = "0.20"

# R-017/R-018 (TD-24): account-wide DEFAULT drawdown gates, config.toml
# layer — unset (commented) means "disabled by default"; per-account
# AccountConfig fields (max_daily_drawdown / max_lifetime_drawdown) always
# win over these when set. Left absent here deliberately: P2's default
# account (paper:alpha) gets no implicit R-017/R-018 enforcement until an
# AccountConfig explicitly sets one.
# max_daily_drawdown_default = "0.03"
# max_lifetime_drawdown_default = "0.25"

# TD-24: `tk account create-paper` fills AccountConfig.max_trades_per_day
# from this dial when a config file omits it — 0 = paper/sim only
# (Mike's sketch: no live-trade budget granted by default).
max_trades_per_day_default = 0

# Series/promotion (batch D consumes these; dials land now per the CTO pin).
series_epoch = "2026-01-01T00:00:00Z"
paper_starting_equity_usd = "500"
n_trials_default = 1

# Batch D: default account_ref for the argless promotion_status()/
# confirm_promotion() verbs (P2 MVP is single-account; FLAGGED, ASSUMPTIONS).
default_account_ref = "paper:alpha"

# SPRINT P3 batch D (DESIGN §12, TD-21): reviewer subprocess dials.
reviewer_binary = "codex"
reviewer_args = []
reviewer_timeout_s = 120
reviewer_max_output_bytes = 1048576
# R-review: unresolved-attack threshold that blocks approval (§12.1).
unresolved_attack_threshold = 1

# SPRINT P4-PAPER batch A (addendum 2): fail-closed live-venue routing gate.
# broker.get("live:*") requires BOTH this dial true AND the live env keys
# (ALPACA_LIVE_KEY_ID/ALPACA_LIVE_SECRET) present, else LiveTradingDisabled.
# Live keys/rotations remain Mike-blocked (sprint doc Addendum 2) — stays
# false until Mike flips it by hand alongside rotating in the live keys.
live_trading_enabled = false
