name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync deps
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run mypy
      - name: Tests (no network — TD-18)
        run: uv run pytest --cov=tradekit --cov-report=term-missing
